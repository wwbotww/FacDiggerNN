dataset_name: eodhd_us_historical_liquid_v1

sources:
  bars: data/bronze/eodhd_us_historical_liquid/bars_daily.parquet
  universe: data/bronze/eodhd_us_historical_liquid/universe_daily.parquet
  corporate_actions: data/bronze/eodhd_us_historical_liquid/corporate_actions.parquet
  delistings: data/bronze/eodhd_us_historical_liquid/delistings.parquet
  source_manifest: data/bronze/eodhd_us_historical_liquid/eodhd_ingestion_manifest.json

output_root: data/snapshots

features:
  name: price_volume_v1
  context_length: 512
  scaler: train_global_robust
  winsor_lower: 0.005
  winsor_upper: 0.995
  channels:
    - r_close
    - r_gap
    - r_intraday
    - range
    - dlog_volume
    - vol20
    - dollar_volume_z20

label:
  name: next_open_to_fifth_close_excess_return
  execution_lag: 1
  horizon: 5
  benchmark: eligible_equal_weight

split:
  train_end: 2021-12-31
  valid_end: 2023-12-29
  test_end: 2025-12-31
  embargo_sessions: 5

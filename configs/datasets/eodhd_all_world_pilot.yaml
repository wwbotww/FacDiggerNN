dataset_name: eodhd_all_world_us_pilot

sources:
  bars: data/bronze/eodhd_us_pilot/bars_daily.parquet
  universe: data/bronze/eodhd_us_pilot/universe_daily.parquet
  corporate_actions: null
  delistings: null
  source_manifest: data/bronze/eodhd_us_pilot/eodhd_ingestion_manifest.json

output_root: data/snapshots

features:
  name: price_volume_v1
  context_length: 512
  scaler: train_global_robust
  winsor_lower: 0.005
  winsor_upper: 0.995
  channels:
    - r_close
    - r_gap
    - r_intraday
    - range
    - dlog_volume
    - vol20
    - dollar_volume_z20

label:
  name: next_open_to_fifth_close_excess_return
  execution_lag: 1
  horizon: 5
  benchmark: eligible_equal_weight

split:
  train_end: 2022-12-30
  valid_end: 2024-12-31
  test_end: 2025-12-31
  embargo_sessions: 5

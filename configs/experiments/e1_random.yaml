experiment_id: e1_random_patchtst
seed: 42
output_root: artifacts/e1
evaluation_split: valid
unlock_test: false
minimum_coverage: 0.98

channels:
  - r_close
  - r_gap
  - r_intraday
  - range
  - dlog_volume
  - vol20
  - dollar_volume_z20
costs_bps: [0, 10, 20, 50]

model:
  patch_length: 12
  patch_stride: 12
  d_model: 128
  num_attention_heads: 16
  num_hidden_layers: 6
  ffn_dim: 512
  dropout: 0.3
  attention_dropout: 0.0
  positional_dropout: 0.0
  path_dropout: 0.0
  ff_dropout: 0.0
  norm_type: batchnorm
  pre_norm: false
  scaling: mean
  alpha_hidden_dim: 128
  alpha_dropout: 0.2

training:
  batch_size: 64
  max_epochs: 30
  patience: 7
  minimum_epochs: 3
  learning_rate: 0.0003
  weight_decay: 0.0001
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  device: auto
  precision: fp16
  num_workers: 0

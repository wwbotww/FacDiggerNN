experiment_id: e2_etth1_patchtst
seed: 42
output_root: artifacts/e2
evaluation_split: valid
unlock_test: false
minimum_coverage: 0.98

channels:
  - r_close
  - r_gap
  - r_intraday
  - range
  - dlog_volume
  - vol20
  - dollar_volume_z20
costs_bps: [0, 10, 20, 50]

# Kept exactly compatible with the pinned ETTh1 encoder. Any change to these
# fields is rejected before loading instead of silently becoming partial transfer.
model:
  patch_length: 12
  patch_stride: 12
  d_model: 128
  num_attention_heads: 16
  num_hidden_layers: 6
  ffn_dim: 512
  dropout: 0.3
  attention_dropout: 0.0
  positional_dropout: 0.0
  path_dropout: 0.0
  ff_dropout: 0.0
  norm_type: batchnorm
  pre_norm: false
  scaling: mean
  alpha_hidden_dim: 128
  alpha_dropout: 0.2

source:
  model_id: ibm-research/patchtst-etth1-pretrain
  revision: 1212736a0decf12b5cea5a605302421e110a3614
  minimum_loaded_numel_ratio: 0.80
  allowlist: []
  local_files_only: false

training:
  batch_size: 64
  max_epochs: 15
  patience: 5
  minimum_epochs: 4
  head_only_epochs: 3
  unfreeze_last_n_blocks: 1
  head_learning_rate: 0.001
  encoder_learning_rate: 0.00001
  weight_decay: 0.0001
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  device: auto
  precision: fp16
  num_workers: 0
